title: "Studio7j"
tagline: "Sites portfolio pour artistes et artisans — livré en 7 jours"
description: "Studio7j crée des sites portfolio sur-mesure pour artistes et artisans d'art : rendu galerie, SEO-first, livré en 7 jours. Peintres, céramistes, sculpteurs, photographes, joailliers."
url: "https://www.studio7j.fr"
lang: "fr"
timezone: "Europe/Paris"

author:
  name: "Studio7j"

twitter:
  username: studio7j
  card: summary_large_image

logo: "/assets/img/og.jpg"

social:
  name: "Studio7j"
  links:
    - https://studio7j.fr

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

permalink: /journal/:title/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: "/assets/img/og.jpg"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
